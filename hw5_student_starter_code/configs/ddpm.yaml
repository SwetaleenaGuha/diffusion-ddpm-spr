run_name: ddpm
seed: 42
data_dir: ../data/imagenet100_128x128/imagenet100_128x128/train
image_size: 128

batch_size: 2
num_workers: 0
num_classes: 100

num_epochs: 5
learning_rate: 0.0001
weight_decay: 0.0001

num_train_timesteps: 1000
num_inference_steps: 20

beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear

variance_type: fixed_small
prediction_type: epsilon

unet_in_size: 128
unet_in_ch: 3
unet_ch: 32
unet_num_res_blocks: 1
unet_ch_mult: [1, 2]
unet_attn: [1]
unet_dropout: 0.0